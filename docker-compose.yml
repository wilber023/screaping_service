version: "3.9"

# Shared environment block — used by api, worker, scheduler
x-app-env: &app-env
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  S3_BUCKET: ${S3_BUCKET}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
  PROXY_LIST: ${PROXY_LIST:-}
  SCRAPE_INTERVAL_HOURS: ${SCRAPE_INTERVAL_HOURS:-6}
  API_KEY_FRONTEND: ${API_KEY_FRONTEND}
  API_KEY_LLM: ${API_KEY_LLM}
  JWT_SECRET: ${JWT_SECRET}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-1440}
  DEBUG: ${DEBUG:-false}

services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agrograph
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: agrograph
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrograph -d agrograph"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ─── Application ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *app-env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *app-env
      PLAYWRIGHT_SERVICE_URL: http://playwright:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - worker_logs:/app/logs
    healthcheck:
      test: ["CMD", "celery", "-A", "scraping.workers.celery_worker", "inspect", "ping", "--timeout", "5"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    volumes:
      - scheduler_data:/tmp

  playwright:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    restart: unless-stopped
    environment:
      DEBUG: ${DEBUG:-false}
    ports:
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s
    shm_size: "512m"

volumes:
  postgres_data:
  redis_data:
  api_logs:
  worker_logs:
  scheduler_data:

networks:
  default:
    driver: bridge
