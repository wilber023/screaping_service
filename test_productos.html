<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroGraph — Productos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4f0; color: #1a1a1a; }

    header {
      background: #2d6a2d; color: white; padding: 16px 24px;
      display: flex; align-items: center; gap: 12px;
    }
    header h1 { font-size: 1.3rem; }
    header span { font-size: 0.8rem; opacity: .7; }

    .controls {
      background: white; padding: 16px 24px; border-bottom: 1px solid #ddd;
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    }
    .controls input, .controls select {
      padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px;
      font-size: 0.9rem; outline: none;
    }
    .controls input:focus, .controls select:focus { border-color: #2d6a2d; }
    .controls input[type=text] { width: 340px; }
    button {
      padding: 8px 18px; background: #2d6a2d; color: white;
      border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem;
    }
    button:hover { background: #245424; }
    button:disabled { background: #888; cursor: not-allowed; }

    #status {
      padding: 10px 24px; font-size: 0.85rem; color: #555;
      min-height: 36px; display: flex; align-items: center; gap: 8px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #888; display: inline-block; }
    .dot.ok  { background: #2d6a2d; }
    .dot.err { background: #c0392b; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px; padding: 20px 24px;
    }
    .card {
      background: white; border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      border-top: 4px solid #ccc; transition: transform .15s;
      overflow: hidden; padding: 0;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
    .card-img {
      width: 100%; height: 160px; object-fit: cover;
      display: block; background: #f0f0f0;
    }
    .card-body { padding: 14px 16px; }
    .card.fungicida   { border-color: #8e44ad; }
    .card.insecticida { border-color: #e67e22; }
    .card.herbicida   { border-color: #27ae60; }
    .card.fertilizante{ border-color: #2980b9; }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .card h3 { font-size: 0.95rem; font-weight: 600; line-height: 1.3; flex: 1; }
    .badge {
      font-size: 0.7rem; padding: 2px 8px; border-radius: 20px;
      font-weight: 600; text-transform: uppercase; white-space: nowrap; margin-left: 8px;
    }
    .fungicida   .badge { background: #f3e5f5; color: #6a1b9a; }
    .insecticida .badge { background: #fff3e0; color: #bf360c; }
    .herbicida   .badge { background: #e8f5e9; color: #1b5e20; }
    .fertilizante .badge { background: #e3f2fd; color: #0d47a1; }

    .card p  { font-size: 0.8rem; color: #555; margin-bottom: 6px; }
    .card .ing { font-size: 0.75rem; color: #777; font-style: italic; margin-bottom: 10px; }

    .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .tag {
      background: #e8f5e9; color: #2d6a2d; font-size: 0.7rem;
      padding: 2px 7px; border-radius: 4px;
    }

    .price {
      font-size: 1.1rem; font-weight: 700; color: #2d6a2d; margin-top: 8px;
    }
    .price.hidden { color: #aaa; font-size: 0.8rem; font-weight: 400; font-style: italic; }

    .source { font-size: 0.7rem; color: #aaa; margin-top: 8px; }

    #empty { text-align: center; padding: 60px 20px; color: #888; font-size: 1rem; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🌱 AgroGraph — Catálogo de Productos</h1>
    <span>Agroquímicos para 14 cultivos</span>
  </div>
</header>

<div class="controls">
  <input type="text" id="apiKey" placeholder="X-API-Key"
    value="4b7e2a9f1c6d3e8b5a0f4c9e2d7b1a6f3c8e5b2d9f0a4c7e1b6d3f8a5c2e9b4d" />

  <select id="userType">
    <option value="agricultor_experimentado">Agricultor (con precios)</option>
    <option value="aprendiz">Aprendiz (sin precios)</option>
  </select>

  <select id="filterType">
    <option value="">Todos los tipos</option>
    <option value="fungicida">Fungicidas</option>
    <option value="insecticida">Insecticidas</option>
    <option value="herbicida">Herbicidas</option>
    <option value="fertilizante">Fertilizantes</option>
  </select>

  <input type="text" id="filterCrop" placeholder="Cultivo (ej: tomate)" style="width:160px" />

  <button id="btnLoad" onclick="loadProducts()">Cargar productos</button>
</div>

<div id="status"><span class="dot" id="dot"></span> <span id="statusText">Listo</span></div>
<div class="grid" id="grid"></div>
<div id="empty" style="display:none">No se encontraron productos con ese filtro.</div>

<script>
const API = "http://44.196.107.153";
let jwt = null;

function setStatus(msg, state) {
  document.getElementById("statusText").textContent = msg;
  const dot = document.getElementById("dot");
  dot.className = "dot" + (state === "ok" ? " ok" : state === "err" ? " err" : "");
}

async function getToken() {
  const apiKey  = document.getElementById("apiKey").value.trim();
  const uType   = document.getElementById("userType").value;
  const res = await fetch(`${API}/auth/token?user_type=${uType}`, {
    method: "POST",
    headers: { "X-API-Key": apiKey }
  });
  if (!res.ok) throw new Error(`Token error ${res.status}: ${await res.text()}`);
  const data = await res.json();
  return data.access_token;
}

async function loadProducts() {
  const btn = document.getElementById("btnLoad");
  btn.disabled = true;
  setStatus("Obteniendo token...");
  document.getElementById("grid").innerHTML = "";
  document.getElementById("empty").style.display = "none";

  try {
    jwt = await getToken();
    setStatus("Cargando productos...");

    const apiKey = document.getElementById("apiKey").value.trim();
    const type   = document.getElementById("filterType").value;
    const crop   = document.getElementById("filterCrop").value.trim();

    let url = `${API}/products?per_page=50`;
    if (type) url += `&product_type=${type}`;
    if (crop) url += `&crop=${encodeURIComponent(crop)}`;

    const res = await fetch(url, {
      headers: {
        "X-API-Key": apiKey,
        "Authorization": `Bearer ${jwt}`
      }
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    const data = await res.json();

    if (!data.items || data.items.length === 0) {
      document.getElementById("empty").style.display = "block";
      setStatus(`0 productos encontrados`, "ok");
      return;
    }

    renderCards(data.items);
    setStatus(`✓ ${data.total} productos · mostrando ${data.items.length}`, "ok");

  } catch (err) {
    setStatus(`Error: ${err.message}`, "err");
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}

function renderCards(items) {
  const grid = document.getElementById("grid");
  grid.innerHTML = items.map(p => {
    const tipo = p.product_type || "otro";
    const crops = (p.target_crops || []).slice(0, 5).map(c =>
      `<span class="tag">${c}</span>`).join("");

    const hasPrice = p.price && p.price.amount != null;
    const priceHtml = hasPrice
      ? `<div class="price">$${p.price.amount.toLocaleString("es-MX")} ${p.price.currency}</div>`
      : `<div class="price hidden">Precio no disponible</div>`;

    const imgSrc = p.image_url || "";
    const imgHtml = imgSrc
      ? `<img class="card-img" src="${imgSrc}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'">`
      : "";

    return `
      <div class="card ${tipo}">
        ${imgHtml}
        <div class="card-body">
          <div class="card-header">
            <h3>${p.name}</h3>
            <span class="badge">${tipo}</span>
          </div>
          <p><strong>Fabricante:</strong> ${p.manufacturer || "—"}</p>
          <p class="ing">${p.active_ingredient || ""}</p>
          <div class="tags">${crops}</div>
          ${priceHtml}
          <div class="source">Fuente: ${p.source} · ${p.stock?.status || ""}</div>
        </div>
      </div>`;
  }).join("");
}
</script>
</body>
</html>
